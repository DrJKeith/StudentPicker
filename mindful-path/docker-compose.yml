version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: mindful-path-test-db
    environment:
      POSTGRES_USER: mindful
      POSTGRES_PASSWORD: mindful
      POSTGRES_DB: mindful_path_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindful -d mindful_path_test"]
      interval: 3s
      timeout: 3s
      retries: 20
